name: Build XPI

on:
  push:
    branches: [main]
    paths:
      - 'popup.js'
      - 'popup.html'
      - 'background.js'
      - 'manifest.json'
      - 'gmail.js'
      - 'vercel.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List files.zip contents
        run: unzip -l files.zip

      - name: Extract all from files.zip
        run: unzip -o files.zip -d fromzip/

      - name: List extracted files
        run: ls -la fromzip/

      - name: Build XPI
        run: |
          zip -j petvalu-bot.xpi \
            manifest.json \
            popup.html \
            popup.js \
            background.js \
            gmail.js \
            vercel.json \
            fromzip/icon16.png \
            fromzip/icon32.png \
            fromzip/icon48.png \
            icon128.png \
            fromzip/icon.png

      - name: Commit and push XPI
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add petvalu-bot.xpi
          if git diff --cached --quiet; then
            echo "XPI unchanged"
          else
            git commit -m "chore: rebuild petvalu-bot.xpi [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
