name: Build XPI

on:
  push:
    branches: [main]
    paths:
      - 'popup.js'
      - 'popup.html'
      - 'background.js'
      - 'manifest.json'
      - 'gmail.js'
      - 'vercel.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build XPI
        run: python3 .github/build_xpi.py

      - name: Commit and push XPI
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add petvalu-bot.xpi
          if git diff --cached --quiet; then
            echo "XPI unchanged"
          else
            git commit -m "chore: rebuild petvalu-bot.xpi [skip ci]"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
